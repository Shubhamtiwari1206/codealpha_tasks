<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#667eea,#764ba2)}
.calculator{width:320px;background:#222;border-radius:15px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.3)}
#display{width:100%;height:70px;border:none;outline:none;font-size:2rem;text-align:right;padding:10px;border-radius:10px;margin-bottom:15px;background:#f5f5f5}
.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
button{padding:20px;font-size:1.2rem;border:none;border-radius:10px;cursor:pointer;transition:.3s}
button:hover{transform:scale(1.05)}
.operator{background:#ff9500;color:#fff}
.equal{background:#28a745;color:#fff}
.clear{background:#dc3545;color:#fff}
.number{background:#444;color:#fff}
@media(max-width:400px){.calculator{width:90%}}
</style>
</head>
<body>
<div class="calculator">
<input type="text" id="display" readonly>
<div class="buttons">
<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="appendValue('/')">÷</button>
<button class="operator" onclick="appendValue('*')">×</button>
<button class="operator" onclick="appendValue('-')">−</button>
<button class="number" onclick="appendValue('7')">7</button>
<button class="number" onclick="appendValue('8')">8</button>
<button class="number" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('+')">+</button>
<button class="number" onclick="appendValue('4')">4</button>
<button class="number" onclick="appendValue('5')">5</button>
<button class="number" onclick="appendValue('6')">6</button>
<button class="equal" onclick="calculate()">=</button>
<button class="number" onclick="appendValue('1')">1</button>
<button class="number" onclick="appendValue('2')">2</button>
<button class="number" onclick="appendValue('3')">3</button>
<button class="number" onclick="appendValue('0')">0</button>
<button class="number" onclick="appendValue('.')">.</button>
<button class="number" onclick="deleteLast()">⌫</button>
</div>
</div>
<script>
const display=document.getElementById("display");
function appendValue(v){display.value+=v;}
function clearDisplay(){display.value="";}
function deleteLast(){display.value=display.value.slice(0,-1);}
function calculate(){try{display.value=eval(display.value);}catch{display.value="Error";}}
document.addEventListener("keydown",function(event){
const key=event.key;
if(!isNaN(key)||"+-*/.".includes(key)){appendValue(key);}
if(key==="Enter"){calculate();}
if(key==="Backspace"){deleteLast();}
if(key==="Escape"){clearDisplay();}
});
</script>
</body>
</html>
