<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeAlpha Image Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f4f4;padding:20px;text-align:center}
h1{margin-bottom:20px;color:#333}
.filter-buttons{margin-bottom:20px}
.filter-buttons button{padding:10px 20px;margin:5px;border:none;border-radius:5px;background:#333;color:#fff;cursor:pointer}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.gallery img{width:100%;border-radius:10px;cursor:pointer;transition:.3s}
.gallery img:hover{transform:scale(1.05)}
#lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);justify-content:center;align-items:center}
#lightbox img{max-width:80%;max-height:80%}
.close,.prev,.next{position:absolute;color:white;font-size:40px;cursor:pointer}
.close{top:20px;right:30px}.prev{left:20px;top:50%}.next{right:20px;top:50%}
</style>
</head>
<body>
<h1>CodeAlpha Image Gallery</h1>
<div class="filter-buttons">
<button onclick="filterImages('all')">All</button>
<button onclick="filterImages('nature')">Nature</button>
<button onclick="filterImages('city')">City</button>
</div>
<div class="gallery">
<img src="https://picsum.photos/id/1015/500/350" class="gallery-item nature">
<img src="https://picsum.photos/id/1011/500/350" class="gallery-item nature">
<img src="https://picsum.photos/id/1012/500/350" class="gallery-item city">
<img src="https://picsum.photos/id/1016/500/350" class="gallery-item city">
</div>
<div id="lightbox"><span class="close">&times;</span><span class="prev">&#10094;</span><img id="lightbox-img"><span class="next">&#10095;</span></div>
<script>
const images=document.querySelectorAll('.gallery-item');
const lightbox=document.getElementById('lightbox');
const lightboxImg=document.getElementById('lightbox-img');
let currentIndex=0;
images.forEach((img,index)=>img.onclick=()=>{lightbox.style.display='flex';lightboxImg.src=img.src;currentIndex=index;});
document.querySelector('.close').onclick=()=>lightbox.style.display='none';
document.querySelector('.next').onclick=()=>{currentIndex=(currentIndex+1)%images.length;lightboxImg.src=images[currentIndex].src;}
document.querySelector('.prev').onclick=()=>{currentIndex=(currentIndex-1+images.length)%images.length;lightboxImg.src=images[currentIndex].src;}
function filterImages(category){images.forEach(img=>img.style.display=(category==='all'||img.classList.contains(category))?'block':'none');}
</script>
</body>
</html>
